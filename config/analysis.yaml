# This project's own analysis parameters (as opposed to config/datasets.yaml,
# which only points at where upstream data lives). Populated incrementally as
# each analysis stage is migrated — see design doc §9.

# --- Gene-level clustering (clustering.smk) ---
clustering:
  random_state: 42      # seed for KMeans / GMM (also KMeans n_init=10)
  k_min: 2              # k-sweep lower bound (evaluate_cluster_numbers, diagnostic)
  k_max: 20             # k-sweep upper bound
  dr_cap: 1.3           # DR above this is clamped to this value (byte-faithful quirk)
  dl_divisor: 10        # DL is divided by this before clustering
  final_n_clusters: 9   # final cluster count k for EVERY variant (WT = enrichment.wt_cluster)
  # --- Finalize variants (design doc 2026-07-21-clustering-finalize-variants) ---
  # Each named variant is one finalize strategy; enrichment.smk fans out over ALL
  # of them (compare), ml.smk uses only `selected_variant`. Every variant emits the
  # unified `cluster` column (1..final_n_clusters, WT = enrichment.wt_cluster);
  # auto_merge/manual_merge also keep a `raw_cluster` column. Fields per `type`:
  #   direct       {method}                  -> cluster straight to final_n_clusters, DR-numbered
  #   auto_merge   {method, n_intermediate}  -> cluster to n_intermediate, ward-merge centroids -> final_n_clusters
  #   grid         {dr_cuts, dl_cuts}        -> axis-cut grid (cell count must == final_n_clusters)
  #   manual_merge {method, n_intermediate}  -> human notebook; NOT Snakemake-buildable
  # grid cuts are thresholds in SCALED space (DR capped, DL divided).
  variants:
    kmeans_direct9:       {type: direct,       method: kmeans}
    kmeans_merge9_auto:   {type: auto_merge,   method: kmeans,           n_intermediate: 64}
    kmeans_merge9_manual: {type: manual_merge, method: kmeans,           n_intermediate: 64}
    hc_direct9:           {type: direct,       method: hierarchical_agg}
    hc_merge9_auto:       {type: auto_merge,   method: hierarchical_agg, n_intermediate: 64}
    gmm_direct9:          {type: direct,       method: gmm}
    gmm_merge9_auto:      {type: auto_merge,   method: gmm,              n_intermediate: 64}
    grid9:                {type: grid,         dr_cuts: [0.4, 0.8, 1.2], dl_cuts: [3.0, 6.0, 10.0]}
  selected_variant: kmeans_direct9   # variant ml.smk reads (equiv. old finalize_mode: auto)
  selected_variant_overrides: {}     # per-dataset override, e.g. {HD_DIT_HAP: kmeans_merge9_manual}

# --- Ontology enrichment (enrichment.smk) ---
enrichment:
  fdr_threshold: 0.05   # alpha for goatools FDR-BH
  wt_cluster: 9         # WT/background cluster id; clusters < this get nonWT comparison
  pop_count_max: 400    # max pop_count for the filtered GO output

# --- Network enrichment: STRING + REVIGO (enrichment_network.smk) ---
enrichment_network:
  revigo_cutoffs: [0.7, 0.5]   # REVIGO semantic-similarity cutoffs, run in order (loose then tight)

# --- PCR / library-prep quality control (pcr_qc.smk) ---
# Which specific libraries to compare in the 2x2 QC figure. These read upstream
# pre-release merged reads (results/8_merged/...) via data_config.merged_reads_path(),
# so every dataset named here must declare `results_dir` in datasets.yaml.
pcr_qc:
  # Panel (a): PBL vs PBR primer reads of one library.
  pbl_pbr:
    dataset: LD_DIT_HAP
    sample: LD1328-7
    timepoint: 0h
    condition: "YES"      # quoted: bare YES is a YAML 1.1 boolean (true)
  # Panel (b): technical replicate — same sample processed in two upstream projects (compare Reads).
  technical_replicate:
    dataset_1: LD_DIT_HAP
    dataset_2: Spore2YES6_1328
    sample: LD1328-7
    timepoint: 0h
    condition: "YES"
  # Panel (c): biological replicate — two samples in one project (compare Reads).
  biological_replicate:
    dataset: LD_DIT_HAP
    sample_1: LD1328-4
    sample_2: LD1328-8
    timepoint: 0h
    condition: "YES"

# --- Machine learning (ml.smk) ---
ml:
  dr_split_threshold: 0.35   # DR > / <= this defines the DR_gt_p35 / DR_le_p35 splits
  wt_cluster: 9              # DIT_HAP_cluster != this defines the nonWT split
  dr_filter: 0.3             # AutoML modeling filter: keep genes with DR > this (train_automl)
  test_size: 0.2             # AutoML train/test split fraction
  random_state: 42           # AutoML split + mljar seed (reproducibility)
  total_time_limit: 14400    # mljar budget (s); large so full algorithm list always finishes
